<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #12181B;
        }
        .box{
            width: 1106px;
            height: 508px;
            margin: 343px 0px 0px 769px;
            border: 1px solid white;
            position: relative;
            z-index: 0;
            transform: translate(-50%, -50%) scale(1);
            perspective: 1000px;
            overflow: hidden; 
        }
        h1{
            /* text-align: center; */
            margin: 195px 0px 0px 385px;
            padding: 0px 0px;
            font-size: 61px;
            color: white;
        }
        /* .bottom{
              /* border-bottom: 224px solid white; 
        } */
        .bottom > span{
            background-color: white;
            width: 100%;
            position: absolute;
            padding: 77px 0;
            bottom: 0;
            transition: 1s;
            transform-origin: center bottom;
            color: black;
            font-size: 62px;
            text-align: center;
            

        }
        .bottom > span::after{
            content: '';
            border: 20px solid transparent;
            border-bottom: 20px solid white;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translate(-50%, 0);
        }
        .bottom > span:hover{
            transform: rotateX(110deg);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>See You Later</h1>
        <div class="bottom">
            <span>Please Try This Game Later</span>
        </div>
    </div>
    
</body>
</html>
